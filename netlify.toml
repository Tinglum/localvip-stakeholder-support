[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_QA_AUTH_BASE_URL = "https://qa.localvip.com"

# Include native binary modules in serverless functions
[functions]
  included_files = ["node_modules/@napi-rs/canvas/**"]

# Plugin runs on Netlify's Linux servers but fails locally on Windows
[[plugins]]
  package = "@netlify/plugin-nextjs"
